name: CPA Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: |
          pip install -e .
      - name: Verify CLI
        run: |
          cpa --help
          cpa --version

  build-wheel:
    name: Build pip wheel
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  build-binary:
    name: Build binary (${{ matrix.os }})
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .
      - name: Build binary
        run: pyinstaller --clean cpa.spec
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cpa-${{ runner.os }}
          path: |
            dist/cpa
            dist/cpa.exe

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheel, build-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          find artifacts -type f -exec sha256sum {} \; | tee artifacts/SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload artifacts/wheel/*.whl
